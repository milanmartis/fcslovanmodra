<!-- app/talker/room_detail.html -->
{% extends base_template %}
{% block content %}

<style scoped>
  body{
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    font-size: 144%;
  }
  :root{
    --bg: #070b14;
    --bg2:#0b1220;
    --panel: rgba(255,255,255,.06);
    --panel2: rgba(255,255,255,.09);
    --stroke: rgba(255,255,255,.10);
    --text: rgba(255,255,255,.92);
    --muted: rgba(255,255,255,.60);

    --accent: rgba(92,159,255,1);
    --accent2: rgba(125, 92, 255, 1);

    --me: rgba(92, 159, 255, .22);
    --them: rgba(255,255,255,.10);

    --radius: 18px;
    --shadow: 0 18px 50px rgba(0,0,0,.45);

    --kb: 0px;
    --vh: 1vh;
  }

  /* --- Minimal scrollbar (tvoj štýl) --- */
  /* Firefox */
  .talker-scroll{
    scrollbar-width: thin;
    scrollbar-color: rgba(92,159,255,.28) transparent;
  }
  /* Chromium / Safari */
  .talker-scroll::-webkit-scrollbar{
    width: 8px;
    height: 8px;
  }
  .talker-scroll::-webkit-scrollbar-track{
    background: transparent;
  }
  .talker-scroll::-webkit-scrollbar-thumb{
    background: rgba(92,159,255,.18);
    border-radius: 999px;
    border: 3px solid transparent;
    background-clip: padding-box;
  }
  .talker-scroll::-webkit-scrollbar-thumb:hover{
    background: rgba(92,159,255,.32);
  }
  .talker-scroll::-webkit-scrollbar-thumb:active{
    background: rgba(92,159,255,.45);
  }
  @media (pointer: coarse){
    .talker-scroll::-webkit-scrollbar{
      width: 6px;
      height: 6px;
    }
  }

  .talker-page{
    min-height: calc(var(--vh) * 100);
    background:
      radial-gradient(1100px 560px at 18% 0%, rgba(92,159,255,.20), transparent 60%),
      radial-gradient(900px 520px at 92% 18%, rgba(125,92,255,.12), transparent 60%),
      linear-gradient(180deg, var(--bg), var(--bg2));
    color: var(--text);
    padding: 12px;
  }

  .talker-page.is-embed{ padding: 0; }

  .talker-shell{
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: calc((var(--vh) * 100) - 88px);
    gap: 10px;
  }

  .talker-page.is-embed .talker-shell{
    max-width: 100%;
    height: calc(var(--vh) * 100);
    gap: 0;
  }

  .talker-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 10px 12px;
    border-radius: var(--radius);
    background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
    border: 1px solid var(--stroke);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
    gap: 10px;
  }

  .talker-page.is-embed .talker-header{
    border-radius: 0;
    box-shadow: none;
    border-left: 0;
    border-right: 0;
  }

  .talker-title{
    display:flex;
    flex-direction:column;
    gap:2px;
    min-width:0;
  }
  .talker-title h2{
    margin:0;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: .2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .talker-sub{
    margin:0;
    font-size: 12px;
    color: var(--muted);
  }

  .talker-actions{
    display:flex;
    align-items:center;
    gap: 10px;
    flex-shrink:0;
  }

  .unread-pill{
    display:flex;
    align-items:center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    font-size: 12px;
    color: rgba(255,255,255,.88);
    user-select:none;
    opacity:.85;
    transition: opacity .2s ease, transform .1s ease, border-color .2s ease;
  }
  .unread-pill .unread-dot{
    width:8px; height:8px; border-radius:99px;
    background: rgba(255,255,255,.35);
  }
  .unread-pill.on{
    opacity: 1;
    border-color: rgba(92,159,255,.45);
    background: rgba(92,159,255,.12);
  }
  .unread-pill.on .unread-dot{ background: rgba(92,159,255,1); }

  .push-btn{
    height: 34px;
    padding: 0 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color: rgba(255,255,255,.92);
    font-weight: 800;
    cursor: pointer;
    transition: transform .08s ease, filter .2s ease, background .2s ease, border-color .2s ease;
    user-select:none;
    white-space: nowrap;
  }
  .push-btn:active{ transform: scale(.98); }
  .push-btn[disabled]{ opacity:.5; cursor:not-allowed; }
  .push-btn.on{
    border-color: rgba(92,159,255,.45);
    background: rgba(92,159,255,.12);
  }

  .talker-badge{
    display:flex;
    align-items:center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    font-size: 12px;
    opacity:.85;
    user-select:none;
    white-space:nowrap;
  }
  .dot{
    width:8px; height:8px; border-radius:99px;
    background: rgba(255,255,255,.35);
  }
  .dot.on{ background: rgba(92,159,255,1); }

  .talker-messages{
    flex: 1;
    border-radius: var(--radius);
    border: 1px solid var(--stroke);
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(10px);
    box-shadow: var(--shadow);
    display:flex;
    flex-direction: column;
    overflow:hidden;
  }
  .talker-page.is-embed .talker-messages{
    border-radius: 0;
    border-left: 0;
    border-right: 0;
    box-shadow: none;
  }

  .talker-scroll{
    flex: 1;
    overflow: auto;
    padding: 12px;
    scroll-behavior: smooth;
  }
  .bubble-row{
    display:flex;
    margin: 8px 0;
  }
  .bubble-row.me{ justify-content: flex-end; }
  .bubble{
    max-width: 76%;
    padding: 10px 12px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,.10);
    background: var(--them);
    box-shadow: 0 10px 28px rgba(0,0,0,.20);
    line-height: 1.25;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble-row.me .bubble{
    background: var(--me);
    border-color: rgba(92,159,255,.22);
  }
  .meta{
    margin-top: 6px;
    font-size: 11px;
    opacity: .65;
    display:flex;
    gap: 8px;
    align-items:center;
  }
  .meta .u{ font-weight: 800; opacity:.85; }
  .meta .t{ opacity:.70; }

  .composer{
    border-top: 1px solid rgba(255,255,255,.10);
    padding: 10px;
    background: rgba(0,0,0,.12);
  }
  .composer-bar{
    display:flex;
    align-items:flex-end;
    gap: 10px;
  }
  .input{
    flex: 1;
    min-height: 44px;
    max-height: 180px;
    resize: none;
    padding: 10px 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    color: var(--text);
    outline: none;
    font-size: 15px;
    line-height: 1.25;
  }
  .input:focus{
    border-color: rgba(92,159,255,.55);
    box-shadow: 0 0 0 3px rgba(92,159,255,.14);
  }

  .send{

    height: 84px;
    min-width: 44px;
    padding: 0 14px;
    border-radius: 19px;
    border: 1px solid rgba(92,159,255,.40);
    background: linear-gradient(180deg, rgba(92,159,255,.34), rgba(92,159,255,.18));
    color: rgba(255,255,255,.95);
    font-weight: 900;
    cursor: pointer;
    transition: transform .08s ease, filter .2s ease, background .2s ease;
    display:flex;
    align-items:center;
    gap: 8px;
    user-select:none;
    box-shadow: 0 14px 32px rgba(92,159,255,.12);
  }
  .send:active{ transform: scale(.98); }
  .send[disabled]{
    opacity:.45;
    cursor:not-allowed;
    filter: saturate(.7);
    box-shadow: none;
  }

  .composer:focus-within .send:not([disabled]){
    filter: saturate(1.25) brightness(1.05);
    box-shadow: 0 18px 40px rgba(92,159,255,.22);
  }

  .send .txt{ display:inline; }
  .send .ico{ font-size: 18px; line-height: 1; }

  .status{
    font-size: 12px;
    color: var(--muted);
    padding: 6px 2px 0;
    min-height: 18px;
  }


/* --- Fullscreen image viewer --- */
.imgfs{
  position: fixed;
  inset: 0;
  z-index: 999999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 14px;
  background: rgba(0,0,0,.88);
  backdrop-filter: blur(6px);
}
.imgfs.on{ display:flex; }

.imgfs__img{
  max-width: min(1100px, 100%);
  max-height: 100%;
  width: auto;
  height: auto;
  border-radius: 14px;
  box-shadow: 0 22px 70px rgba(0,0,0,.6);
  object-fit: contain;
  background: rgba(255,255,255,.02);
}

.imgfs__close{
  position: absolute;
  top: 12px;
  right: 12px;
  height: 42px;
  min-width: 42px;
  padding: 0 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.18);
  background: rgba(255,255,255,.08);
  color: rgba(255,255,255,.95);
  font-weight: 900;
  cursor: pointer;
}
.imgfs__hint{
  position: absolute;
  left: 12px;
  bottom: 12px;
  font-size: 12px;
  color: rgba(255,255,255,.7);
  user-select: none;
}

body.lock-scroll{ overflow: hidden; }



  @media (max-width: 520px){
    .talker-page{ padding: 8px; }
    .talker-shell{ height: calc((var(--vh) * 100) - 70px); }
    .bubble{ max-width: 88%; }
    .talker-page.is-embed .talker-shell{ height: calc(var(--vh) * 100); }

    .send{ padding: 0 12px; }
    .send .txt{ display:none; }
  }
</style>
<script>
  const IS_ADMIN = {{ 'true' if is_admin else 'false' }};
</script>
{% set is_embed = request.args.get('embed') == '1' %}

<div class="talker-page {{ 'is-embed' if is_embed else '' }}">
  <div class="talker-shell">

    <div class="talker-header">
      <!--
        <div class="talker-title">
          <p class="talker-sub">Najnovšie správy sú dole</p>
        </div>
      -->
      <div class="talker-title">
        <h2>{{ room.name }}</h2>
      </div>

      <div class="talker-actions">
        <!--
        <div class="unread-pill" id="unreadPill" title="Neprečítané v tejto miestnosti">
          <span class="unread-dot"></span>
          <span id="unreadCount">0</span>
        </div>
        <a class="push-btn" href="/talker/webpush/test" style="text-decoration:none; display:inline-flex; align-items:center;">
          Test push
        </a>
        -->
        <button class="push-btn" id="backBtn" type="button">Back</button>
        <button class="push-btn" id="pushBtn" type="button">Push…</button>

        <div class="talker-badge" id="conn">
          <span id="dot" class="dot"></span>
          <span id="connText">Connecting…</span>
        </div>
      </div>
    </div>

    <div class="talker-messages">
      <div id="scroll" class="talker-scroll">
        <div id="list"></div>
        <div id="bottom"></div>
      </div>

      <div class="composer">
        <form id="f" class="composer-bar" autocomplete="off">
          <!-- ✅ file upload -->
          <input id="fileInput" type="file"
          accept="
            video/mp4,video/webm,video/quicktime,
            image/jpeg,image/png,image/webp,image/gif,
            application/pdf,
            application/msword,
            application/vnd.openxmlformats-officedocument.wordprocessingml.document,
            application/vnd.ms-excel,
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
          "
          style="display:none" />
          <style>
            .action-buttons{
              display: flex;
              flex-direction: column; /* nad sebou */
              gap: 8px;               /* medzera */
              align-items: center;    /* nech sú pekne zarovnané */
            }
            
            .action-buttons .push-btn{
              display: inline-flex;
              align-items: center;
              justify-content: center;
            }
          </style>
          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
          <div class="action-buttons">
            <!-- ✅ attach button -->
            <button id="attachBtn" class="push-btn" type="button" title="Vložiť súbor">
              <i class="fa-solid fa-paperclip"></i>
            </button>
          
            {% if current_user.is_authenticated and (current_user.has_roles('Admin') or current_user.has_roles('Coach')) %}
              <button id="pollBtn" class="push-btn" type="button" title="Anketa">
                <i class="fa-solid fa-square-poll-vertical"></i>
              </button>
            {% endif %}
          </div>
          <textarea id="t" class="input" rows="1"
                    placeholder="Napíš správu… (Enter = odoslať, Shift+Enter = nový riadok)"></textarea>
        
    
        
          <button id="sendBtn" class="send" type="submit" disabled>
            <span class="txt">Send</span>
            <span class="ico" aria-hidden="true">➤</span>
          </button>
        </form>
        <div class="status" id="status"></div>
      </div>
    </div>

  </div>
</div>
<!-- Fullscreen image overlay -->

  <button id="imgFsClose" class="imgfs__close" type="button" aria-label="Close">✕</button>
  <img id="imgFsImg" class="imgfs__img" alt="image preview" />
  <div class="imgfs__hint">ESC / klik mimo = zavrieť</div>

<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<!-- ✅ Firebase (potrebné pre non-iOS FCM flow, lebo kód používa window.firebase) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-messaging.js"></script>

<script>
  const roomId = {{ room.id }};
  window.__ROOM_ID = roomId;
  window.__ACTIVE_TALKER_ROOM_ID = roomId;   // ✅ aby menu vedelo odfiltrovať aktívnu room
  const myUserId = {{ current_user.id }};

  const scrollEl = document.getElementById("scroll");
  const listEl = document.getElementById("list");
  const bottomEl = document.getElementById("bottom");
  const formEl = document.getElementById("f");
  const inputEl = document.getElementById("t");
  const sendBtn = document.getElementById("sendBtn");
  const connTextEl = document.getElementById("connText");
  const dotEl = document.getElementById("dot");
  const statusEl = document.getElementById("status");
  const pushBtn = document.getElementById("pushBtn");
  const backBtn = document.getElementById("backBtn");
  const attachBtn = document.getElementById("attachBtn");
  const fileInput = document.getElementById("fileInput");
  const pollBtn = document.getElementById("pollBtn");

  // zachované (bolo v súbore)
  const unreadPill = document.getElementById("unreadPill");
  const unreadCountEl = document.getElementById("unreadCount");

  const socket = window.__SOCKET || io("/", { transports:["websocket","polling"], withCredentials:true });
  window.__SOCKET = socket;
  // ---------------------------
  // Badge API (best-effort)
  // ---------------------------
  function setBadge(count) {
    count = Number(count) || 0;
    try {
      if (navigator.setAppBadge) {
        if (count > 0) navigator.setAppBadge(count);
        else if (navigator.clearAppBadge) navigator.clearAppBadge();
      }
    } catch (e) {}
  }

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.addEventListener("message", (event) => {
      const d = event?.data;
      if (!d) return;
  
      // podpor oba typy, kým to celé neprejde na SET_BADGE
      if (d.type === "SET_BADGE" || d.type === "badge") {
        setBadge(d.count || 0);
      }
  
      if (d.type === "open" && d.url) {
        // optional (tvoje)
        window.addEventListener("beforeunload", () => {
          try { window.__ACTIVE_TALKER_ROOM_ID = null; } catch(e) {}
        });
      }
    });
  }
  
  // ---------------------------
  // VH fix (iOS / klávesnica)
  // ---------------------------
  function setVH() {
    const h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
    document.documentElement.style.setProperty("--vh", (h * 0.01) + "px");
  }
  setVH();
  window.addEventListener("resize", setVH);
  window.visualViewport && window.visualViewport.addEventListener("resize", setVH);

  // ---------------------------
  // UI helpers
  // ---------------------------
  function escapeHtml(s) {
    return String(s || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function fmtTime(iso) {
    try {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleString(undefined, { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "2-digit" });
    } catch { return ""; }
  }

  function isNearBottom(px = 60) {
    return (scrollEl.scrollHeight - scrollEl.scrollTop - scrollEl.clientHeight) <= px;
  }

  function scrollToBottomHard() {
    const scroller = document.getElementById("scroll");
    const bottom = document.getElementById("bottom");
    if (!scroller || !bottom) return;
  
    // 1) klasicky nastav scrollTop
    scroller.scrollTop = scroller.scrollHeight + 999999;
  
    // 2) anchor scroll (najspoľahlivejšie)
    bottom.scrollIntoView({ block: "end" });
  
    // 3) dorovnanie po layout-e (obrázky/video sa načítajú neskôr)
    requestAnimationFrame(() => {
      scroller.scrollTop = scroller.scrollHeight + 999999;
      bottom.scrollIntoView({ block: "end" });
    });
  
    setTimeout(() => {
      scroller.scrollTop = scroller.scrollHeight + 999999;
      bottom.scrollIntoView({ block: "end" });
    }, 80);
  }
  

  function focusNoScroll(){
    try { inputEl.focus({ preventScroll: true }); } catch(e){ inputEl.focus(); }
  }

  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + "px";
  }

  function updateSendState() {
    const ok = !!inputEl.value.trim();
    sendBtn.disabled = !ok;
  }

  inputEl.addEventListener("input", () => {
    autoResize();
    updateSendState();
  });

  // ✅ ENTER = send, SHIFT+ENTER = newline
  inputEl.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    if (e.isComposing) return;

    // Shift+Enter -> nový riadok
    if (e.shiftKey) return;

    // Enter -> odoslať
    e.preventDefault();
    if (!sendBtn.disabled) {
      if (typeof formEl.requestSubmit === "function") formEl.requestSubmit();
      else formEl.dispatchEvent(new Event("submit", { cancelable: true, bubbles: true }));
    }
  });



  const pollCache = new Map(); // poll_id -> data

  function pollKey(pid){ return String(pid); }
  
  function renderPollInto(bubbleEl, pollData) {
    const pid = String(pollData.poll_id);
    const counts = pollData.counts || {};
    const myVotes = new Set((pollData.my_votes || []).map(Number));
    const voters = pollData.voters || {}; // { optionId: [username...] }
  
    const wrap = document.createElement("div");
    wrap.className = "poll-wrap";
    wrap.dataset.pollId = pid;
  
    const title = document.createElement("div");
    title.style.fontWeight = "900";
    title.style.marginBottom = "8px";
    title.style.lineHeight = "1.25";
    title.style.whiteSpace = "normal";
    title.textContent = "📊 " + (pollData.question || "Anketa");
  
    const list = document.createElement("div");
    list.className = "poll-options";
    list.style.display = "grid";
    list.style.gap = "8px";
  
    for (const opt of (pollData.options || [])) {
      const oid = Number(opt.id);
      const c = Number(counts[String(oid)] || 0);
      const voted = myVotes.has(oid);
  
      // kontajner pre jednu možnosť
      const row = document.createElement("div");
      row.style.display = "grid";
      row.style.gap = "6px";
  
      // horný riadok: tlačidlo + toggle
      const top = document.createElement("div");
      top.style.display = "flex";
      top.style.gap = "8px";
      top.style.alignItems = "center";
  
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "push-btn";
      btn.style.flex = "1";
      btn.dataset.optionId = String(oid);
      btn.dataset.pollId = pid;
  
      // ✅ krajší layout + zalamovanie
      btn.style.display = "flex";
      btn.style.alignItems = "center";
      btn.style.justifyContent = "space-between";
      btn.style.gap = "10px";
      btn.style.textAlign = "left";
      btn.style.whiteSpace = "normal";
      btn.style.lineHeight = "1.25";
      btn.style.padding = "10px 12px";
  
      btn.classList.toggle("on", voted);
  
      // ✅ text + badge count
      btn.innerHTML = `
        <span style="flex:1; min-width:0; white-space:normal; overflow-wrap:anywhere;">
          ${escapeHtml(opt.text)}
        </span>
        <span style="
          display:inline-flex; align-items:center; justify-content:center;
          min-width:28px; height:22px; padding:0 8px;
          border-radius:999px; font-size:12px; font-weight:800;
          border:1px solid rgba(255,255,255,.14);
          background:rgba(255,255,255,.08);">
          ${c}
        </span>
      `;
  
      if (voted) {
        btn.style.outline = "2px solid rgba(255,255,255,18)";
      }
  
      // ✅ toggle (rozbal hlasujúcich)
      const toggle = document.createElement("button");
      toggle.type = "button";
      toggle.className = "push-btn";
      toggle.title = "Zobraziť kto hlasoval";
      toggle.textContent = "i";
      toggle.style.minWidth = "42px";
      toggle.style.display = "inline-flex";
      toggle.style.alignItems = "center";
      toggle.style.justifyContent = "center";
      toggle.style.padding = "10px";
  
      // ✅ voters box (pekne, zalamovanie + chips + scroll)
      const people = voters[String(oid)] || [];
  
      const votersBox = document.createElement("div");

  const LS_PUSH_ENABLED = "talker:pushEnabled"; // 1 / 0

  function isStandalone() {
    return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  }
  function isIOS() {
    const ua = navigator.userAgent || "";
    return /iPhone|iPad|iPod/i.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  }
  function isSafari() {
    const ua = navigator.userAgent || "";
    return /^((?!chrome|crios|fxios|android).)*safari/i.test(ua);
  }
  function isIosPwaSafari() {
    return isIOS() && isSafari() && isStandalone();
  }

  function canUsePush() {
    if (!("serviceWorker" in navigator)) return false;
    if (!("Notification" in window)) return false;
    if (!("PushManager" in window)) return false;
    if (isIosPwaSafari() && !("PushManager" in window)) return false;
    return true;
  }

  function setPushUiEnabled(enabled) {
    pushBtn.classList.toggle("on", !!enabled);
    pushBtn.textContent = enabled ? "Vypnúť push" : "Zapnúť push";
  }

  function getPushEnabled() {
    return localStorage.getItem(LS_PUSH_ENABLED) === "1";
  }

  function setPushEnabledLocal(enabled) {
    localStorage.setItem(LS_PUSH_ENABLED, enabled ? "1" : "0");
    setPushUiEnabled(enabled);
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
    const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
    const rawData = atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }

  async function getPushConfig() {
    const res = await fetch("/talker/push/config", { credentials: "include" });
    if (!res.ok) throw new Error("push/config failed");
    const cfg = await res.json();

    try {
      window.__PUSH_CFG__ = cfg;
      if (cfg?.vapidPublicKey) window.vapidPublicKey = cfg.vapidPublicKey;
      if (cfg?.fcmVapidPublicKey) window.fcmVapidPublicKey = cfg.fcmVapidPublicKey;
    } catch (_) {}

    return cfg;
  }

  async function registerRootSW() {
    const reg = await navigator.serviceWorker.register("/firebase-messaging-sw.js", { scope: "/" });
    await navigator.serviceWorker.ready;
    return reg;
  }

  async function enableWebPushIOS() {
    const cfg = await getPushConfig();

    const vapidKeyWebPush = cfg.vapidPublicKey || cfg.fcmVapidPublicKey;
    if (!vapidKeyWebPush) throw new Error("Missing VAPID public key");

    if (!isIosPwaSafari()) {
      throw new Error("iOS vyžaduje Safari + Add to Home Screen (standalone)");
    }

    await registerRootSW();

    const perm = await Notification.requestPermission();
    if (perm !== "granted") throw new Error("Permission not granted");

    const reg = await navigator.serviceWorker.ready;

    const existing = await reg.pushManager.getSubscription();
    const sub = existing || await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(vapidKeyWebPush),
    });

    const r = await fetch("/talker/webpush/subscribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify(sub.toJSON()),
    });
    if (!r.ok) throw new Error("webpush/subscribe failed: " + (await r.text()));
  }

  async function enableFcmNonIOS() {
    const cfg = await getPushConfig();
    await registerRootSW();

    const perm = await Notification.requestPermission();
    if (perm !== "granted") throw new Error("Permission not granted");

    if (!window.firebase) throw new Error("firebase not loaded in page");

    const firebaseCfg = cfg.firebase || {};
    if (!firebaseCfg.messagingSenderId || !firebaseCfg.appId) throw new Error("Missing firebase config");

    const vapidKey = cfg.fcmVapidPublicKey || cfg.vapidPublicKey;
    if (!vapidKey) throw new Error("Missing VAPID key (fcmVapidPublicKey/vapidPublicKey)");

    if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseCfg);

    const reg = await navigator.serviceWorker.ready;

    let messaging;
    try {
      messaging = firebase.messaging();
    } catch (e) {
      throw new Error("firebase.messaging() failed");
    }

    let token;
    try {
      token = await messaging.getToken({
        vapidKey: vapidKey,
        serviceWorkerRegistration: reg,
      });
    } catch (e) {
      console.error("getToken error:", e);
      throw new Error("FCM getToken failed");
    }

    if (!token) throw new Error("no_token");

    // uložiť si posledný FCM token lokálne, aby sa dal unregisternúť aj keď sa neskôr zmení stránka
    try { localStorage.setItem("talker:lastFcmToken", token); } catch(e) {}

    const rr = await fetch("/talker/push/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ token, platform: "web", device: navigator.userAgent }),
    });
    if (!rr.ok) throw new Error("push/register failed: " + (await rr.text()));
  }

  async function enablePushFlow() {
    if (!canUsePush()) {
      throw new Error("Push nie je podporovaný v tomto prehliadači.");
    }

    if (isIOS() && isSafari() && !isStandalone()) {
      throw new Error("Na iOS musíš dať Add to Home Screen (PWA), až potom ide push.");
    }

    if (Notification.permission === "denied") {
      throw new Error("Push sú zablokované v prehliadači. Povoľ ich v nastaveniach webu.");
    }

    if (isIosPwaSafari()) {
      await enableWebPushIOS();
    } else {
      await enableFcmNonIOS();
    }
  }

  async function disablePushFlow() {
    // 1) Odhlás WebPush subscription (iOS flow)
    try {
      const reg = await navigator.serviceWorker.getRegistration("/") || await navigator.serviceWorker.getRegistration();
      if (reg && reg.pushManager) {
        const sub = await reg.pushManager.getSubscription();
        if (sub) {
          // server-side cleanup (ak endpoint existuje)
          try {
            await fetch("/talker/webpush/unsubscribe", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ endpoint: sub.endpoint }),
            });
          } catch (e) {}
          await sub.unsubscribe();
        }
      }
    } catch (e) {}

    // 2) Zmaž FCM token
    try {
      const cfg = window.__PUSH_CFG__ || await getPushConfig();
      const firebaseCfg = cfg.firebase || {};
      const vapidKey = cfg.fcmVapidPublicKey || cfg.vapidPublicKey;

      if (window.firebase && vapidKey && firebaseCfg && firebaseCfg.messagingSenderId && firebaseCfg.appId) {
        if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseCfg);

        const reg = await navigator.serviceWorker.ready;
        const messaging = firebase.messaging();

        // najprv skús deleteToken priamo (zmaže aktuálny token)
        let deletedOk = false;
        try {
          deletedOk = await messaging.deleteToken();
        } catch (e) {}

        // server-side cleanup: pošli token (ak ho máme)
        const lastTok = localStorage.getItem("talker:lastFcmToken");
        if (lastTok) {
          try {
            await fetch("/talker/push/unregister", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ token: lastTok }),
            });
          } catch (e) {}
          try { localStorage.removeItem("talker:lastFcmToken"); } catch(e) {}
        }

        void(deletedOk);
      }
    } catch (e) {}
  }

  async function setPushEnabled(enabled) {
    // UI + local flag
    setPushEnabledLocal(!!enabled);

    if (!enabled) {
      statusEl.textContent = "Vypínam push…";

  }

  async function ensureWebPushSubscription() {
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) return;
  
    const cfg = window.__PUSH_CFG__ || await getPushConfig().catch(() => null);
    const vapidKeyWebPush = cfg?.vapidPublicKey || cfg?.fcmVapidPublicKey || window.vapidPublicKey || window.fcmVapidPublicKey;
    if (!vapidKeyWebPush) throw new Error("Missing VAPID public key");
  
    await registerRootSW();
  
    if (Notification.permission !== "granted") {
      const perm = await Notification.requestPermission();
      if (perm !== "granted") throw new Error("Permission not granted");
    }
  
    const reg = await navigator.serviceWorker.ready;
  
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(vapidKeyWebPush),
      });
    }
  
    // refresh/upsert na server
    const r = await fetch("/talker/webpush/subscribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify(sub.toJSON()),
    });
  
    if (!r.ok) throw new Error("webpush/subscribe failed: " + (await r.text()));
  }

  socket.on("talker_message", async (m) => {

    if (atBottom && visible) {

      try {
        await fetch(`/talker/rooms/${roomId}/mark-read`, {
          method: "POST",
          credentials: "include",

        });

    }

  });

  formEl.addEventListener("submit", async (e) => {

    const text = inputEl.value.trim();
    if (!text) return;

    socket.emit("talker_send", { room_id: roomId, msg_type: "text", text });

    inputEl.value = "";
    autoResize();

    try {
      await fetch(`/talker/rooms/${roomId}/mark-read`, {

        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({}),
      });

    await refreshUnreadAndBadge();

    if ("clearAppBadge" in navigator) navigator.clearAppBadge();

  // ---------------------------
// video attach/upload -> send as msg_type="video"
// ---------------------------
// attach/upload -> send as msg_type="video" alebo "image"
if (attachBtn && fileInput) {
  attachBtn.addEventListener("click", () => fileInput.click());

  const allowedDocs = new Set([
    "application/pdf",
    "application/msword",
    "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
    "application/vnd.ms-excel",
    "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
    "application/vnd.ms-powerpoint",
    "application/vnd.openxmlformats-officedocument.presentationml.presentation",
  ]);

  fileInput.addEventListener("change", async () => {
    const f = (fileInput.files && fileInput.files[0]) || null;
    const MAX = 30 * 1024 * 1024; // 20MB
    if (f.size > MAX) {
      statusEl.textContent = "Max veľkosť súboru je 30 MB.";
      setTimeout(() => (statusEl.textContent = ""), 3500);
      fileInput.value = "";
      return;
    }
    if (!f) return;

    const mime = (f.type || "").toLowerCase();
    const isImg = mime.startsWith("image/");
    const isVid = mime.startsWith("video/");
    const isDoc = allowedDocs.has(mime);

    // ✅ validácia (pozor: používať f / mime, nie file)
    if (!isImg && !isVid && !isDoc) {
      showError("Nepodporovaný formát súboru");
      fileInput.value = ""; // dôležité: aby sa dal vybrať rovnaký súbor znova
      return;
    }

    // UI
    attachBtn.disabled = true;

    // status text podľa typu
    if (statusEl) {
      statusEl.textContent = isImg
        ? "Nahrávam obrázok…"
        : isVid
          ? "Nahrávam video…"
          : "Nahrávam súbor…";
    }

    try {
      const fd = new FormData();
      fd.append("file", f);

      const r = await fetch(`/talker/rooms/${roomId}/upload`, {
        method: "POST",
        credentials: "include",
        body: fd,
      });

      const j = await r.json().catch(() => ({}));
      if (!r.ok || !j.ok) {
        throw new Error(j.detail || j.error || "upload_failed");
      }

      // ✅ msg_type podľa typu
      const msgType = isImg ? "image" : isVid ? "video" : "file";

      socket.emit("talker_send", {
        room_id: roomId,
        msg_type: msgType,
        text: (inputEl && inputEl.value ? inputEl.value.trim() : ""), // caption (voliteľné)
        attachment_url: j.url,
        attachment_mime: j.mime || mime,
        attachment_size: Number(j.size || f.size || 0),
      });

      if (inputEl) inputEl.value = "";
      if (typeof autoResize === "function") autoResize();
      if (typeof updateSendState === "function") updateSendState();
      if (typeof scrollToBottomHard === "function") scrollToBottomHard();

      if (statusEl) statusEl.textContent = "";

    } catch (e) {
      console.error(e);
      if (statusEl) {
        statusEl.textContent = "Upload zlyhal.";
        setTimeout(() => {
          if (statusEl) statusEl.textContent = "";
        }, 3500);
      }
    } finally {
      attachBtn.disabled = false;
      fileInput.value = "";
    }
  });
}

function extractUrls(text) {
  const urlRegex = /(\b(?:https?:\/\/|www\.)[^\s<]+)\b/gi;
  const m = String(text || "").match(urlRegex);
  return m ? m.map(u => u.trim()) : [];
}

function isYoutubeUrl(url) {
  return url.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/i);
}

function createYoutubeEmbed(url) {
  const yt = isYoutubeUrl(url);
  if (!yt) return null;
  const youtubeId = yt[1];
  const iframe = document.createElement("iframe");
  iframe.src = `https://www.youtube.com/embed/${youtubeId}`;
  iframe.style.width = "100%";
  iframe.style.aspectRatio = "16 / 9";
  iframe.style.border = "0";
  iframe.style.borderRadius = "12px";
  iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
  iframe.allowFullscreen = true;
  return iframe;
}

async function fetchLinkMeta(url) {
  const completeUrl = url.startsWith("www.") ? `https://${url}` : url;
  const r = await fetch("/talker/url-metadata", {
    method: "POST",
    credentials: "include",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ url: completeUrl }),
  });
  const j = await r.json().catch(() => ({}));
  return { url: completeUrl, ...j };
}

function renderLinkCard(meta) {
  const a = document.createElement("a");
  a.href = meta.url;
  a.target = "_blank";
  a.rel = "noopener noreferrer";
  a.style.display = "block";
  a.style.marginTop = "8px";
  a.style.padding = "10px";
  a.style.borderRadius = "12px";
  a.style.border = "1px solid rgba(255,255,255,12)";
  a.style.background = "rgba(255,255,255,06)";
  a.style.color = "inherit";
  a.style.textDecoration = "none";

  if (meta.image_url) {
    const img = document.createElement("img");
    img.src = meta.image_url;
    img.alt = "";
    img.style.width = "100%";
    img.style.borderRadius = "10px";
    img.style.marginBottom = "8px";
    img.style.display = "block";
    a.appendChild(img);
  }

  const t = document.createElement("div");
  t.style.fontWeight = "800";
  t.style.marginBottom = "4px";
  t.textContent = meta.title || meta.url;

  const d = document.createElement("div");
  d.style.opacity = ".75";
  d.style.fontSize = "12px";
  d.textContent = meta.description || "";

  a.appendChild(t);
  if (meta.description) a.appendChild(d);

  return a;
}

<script>
  // ---------------------------
// Fullscreen image viewer
// ---------------------------
const imgFs = document.getElementById("imgFs");
const imgFsImg = document.getElementById("imgFsImg");
const imgFsClose = document.getElementById("imgFsClose");

function openImgFs(src) {
  if (!src || !imgFs || !imgFsImg) return;
  imgFsImg.src = src;
  imgFs.classList.add("on");
  imgFs.setAttribute("aria-hidden", "false");
  document.body.classList.add("lock-scroll");
}

function closeImgFs() {
  if (!imgFs || !imgFsImg) return;
  imgFs.classList.remove("on");
  imgFs.setAttribute("aria-hidden", "true");
  // uvoľni src (aby sa video-like veci nepodržali v pamäti)
  imgFsImg.src = "";
  document.body.classList.remove("lock-scroll");
}

// Delegácia: funguje aj na nové správy bez ďalších listenerov
document.addEventListener("click", (e) => {
  const t = e.target;

  // klik na obrázok v správe
  const img = t && t.closest && t.closest("img.js-imgfs");
  if (img) {
    e.preventDefault();
    e.stopPropagation();
    openImgFs(img.dataset.fullsrc || img.src);
    return;
  }

  // klik mimo obrázka v overlay
  if (imgFs && imgFs.classList.contains("on")) {
    if (t === imgFs) closeImgFs();
  }
});

imgFsClose && imgFsClose.addEventListener("click", (e) => {
  e.preventDefault();
  closeImgFs();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && imgFs && imgFs.classList.contains("on")) closeImgFs();
});


(function () {
  // použijeme existujúci roomId z tejto stránky
  const rid = Number(window.__ROOM_ID || window.__ACTIVE_TALKER_ROOM_ID || 0);
  if (!rid) return;

  let lastId = 0;

  function updateLastIdFromDom() {
    try {
      const nodes = document.querySelectorAll('.bubble-row[data-msg-id]');
      let maxId = 0;
      nodes.forEach(n => {
        const v = Number(n.dataset.msgId || 0);
        if (v > maxId) maxId = v;
      });
      if (maxId > 0) lastId = maxId;
    } catch(e){}
  }

  async function fetchNew() {
    updateLastIdFromDom();

    const url = lastId
      ? `/talker/rooms/${rid}/messages?after_id=${lastId}&limit=200`
      : `/talker/rooms/${rid}/messages?limit=50`;

    const r = await fetch(url, { credentials: "include" });
    if (!r.ok) return;

    const msgs = await r.json();
    if (!Array.isArray(msgs) || !msgs.length) return;

    // zoradiť od najstarších po najnovšie (aby sa pekne pridávali)
    msgs.sort((a,b) => Number(a.id||0) - Number(b.id||0));

    const wasNearBottom = isNearBottom(120);

    for (const m of msgs) renderMessage(m);

    lastId = Math.max(lastId, ...msgs.map(m => Number(m.id || 0)));

    if (wasNearBottom) scrollToBottomHard();

    // keď sa vrátiš do appky, označ ako prečítané
    try {
      await fetch(`/talker/rooms/${rid}/mark-read`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({}),
      });
    } catch(e){}

    await refreshUnreadAndBadge();
  }

  // po návrate do appky
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") fetchNew().catch(() => {});
  });

  // keď sa vráti internet
  window.addEventListener("online", () => fetchNew().catch(() => {}));

  // po reconnecte socketu
  const s = window.__SOCKET;
  if (s) s.on("connect", () => fetchNew().catch(() => {}));
})();


</script>
