<!-- app/talker/room_detail.html -->
{% extends base_template %}
{% block content %}

<style scoped>
  body{
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    font-size: 144%;
  }
  :root{
    --bg: #070b14;
    --bg2:#0b1220;
    --panel: rgba(255,255,255,.06);
    --panel2: rgba(255,255,255,.09);
    --stroke: rgba(255,255,255,.10);
    --text: rgba(255,255,255,.92);
    --muted: rgba(255,255,255,.60);

    --accent: rgba(92,159,255,1);
    --accent2: rgba(125, 92, 255, 1);

    --me: rgba(92, 159, 255, .22);
    --them: rgba(255,255,255,.10);

    --radius: 18px;
    --shadow: 0 18px 50px rgba(0,0,0,.45);

    --kb: 0px;
    --vh: 1vh;
  }

  /* --- Minimal scrollbar (tvoj štýl) --- */
  /* Firefox */
  .talker-scroll{
    scrollbar-width: thin;
    scrollbar-color: rgba(92,159,255,.28) transparent;
  }
  /* Chromium / Safari */
  .talker-scroll::-webkit-scrollbar{
    width: 8px;
    height: 8px;
  }
  .talker-scroll::-webkit-scrollbar-track{
    background: transparent;
  }
  .talker-scroll::-webkit-scrollbar-thumb{
    background: rgba(92,159,255,.18);
    border-radius: 999px;
    border: 3px solid transparent;
    background-clip: padding-box;
  }
  .talker-scroll::-webkit-scrollbar-thumb:hover{
    background: rgba(92,159,255,.32);
  }
  .talker-scroll::-webkit-scrollbar-thumb:active{
    background: rgba(92,159,255,.45);
  }
  @media (pointer: coarse){
    .talker-scroll::-webkit-scrollbar{
      width: 6px;
      height: 6px;
    }
  }

  .talker-page{
    min-height: calc(var(--vh) * 100);
    background:
      radial-gradient(1100px 560px at 18% 0%, rgba(92,159,255,.20), transparent 60%),
      radial-gradient(900px 520px at 92% 18%, rgba(125,92,255,.12), transparent 60%),
      linear-gradient(180deg, var(--bg), var(--bg2));
    color: var(--text);
    padding: 12px;
  }

  .talker-page.is-embed{ padding: 0; }

  .talker-shell{
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: calc((var(--vh) * 100) - 88px);
    gap: 10px;
  }

  .talker-page.is-embed .talker-shell{
    max-width: 100%;
    height: calc(var(--vh) * 100);
    gap: 0;
  }

  .talker-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 10px 12px;
    border-radius: var(--radius);
    background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
    border: 1px solid var(--stroke);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
    gap: 10px;
  }

  .talker-page.is-embed .talker-header{
    border-radius: 0;
    box-shadow: none;
    border-left: 0;
    border-right: 0;
  }

  .talker-title{
    display:flex;
    flex-direction:column;
    gap:2px;
    min-width:0;
  }
  .talker-title h2{
    margin:0;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: .2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .talker-sub{
    margin:0;
    font-size: 12px;
    color: var(--muted);
  }

  .talker-actions{
    display:flex;
    align-items:center;
    gap: 10px;
    flex-shrink:0;
  }

  .unread-pill{
    display:flex;
    align-items:center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    font-size: 12px;
    color: rgba(255,255,255,.88);
    user-select:none;
    opacity:.85;
    transition: opacity .2s ease, transform .1s ease, border-color .2s ease;
  }
  .unread-pill .unread-dot{
    width:8px; height:8px; border-radius:99px;
    background: rgba(255,255,255,.35);
  }
  .unread-pill.on{
    opacity: 1;
    border-color: rgba(92,159,255,.45);
    background: rgba(92,159,255,.12);
  }
  .unread-pill.on .unread-dot{ background: rgba(92,159,255,1); }

  .push-btn{
    height: 34px;
    padding: 0 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color: rgba(255,255,255,.92);
    font-weight: 800;
    cursor: pointer;
    transition: transform .08s ease, filter .2s ease, background .2s ease, border-color .2s ease;
    user-select:none;
    white-space: nowrap;
  }
  .push-btn:active{ transform: scale(.98); }
  .push-btn[disabled]{ opacity:.5; cursor:not-allowed; }
  .push-btn.on{
    border-color: rgba(92,159,255,.45);
    background: rgba(92,159,255,.12);
  }

  .talker-badge{
    display:flex;
    align-items:center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    font-size: 12px;
    opacity:.85;
    user-select:none;
    white-space:nowrap;
  }
  .dot{
    width:8px; height:8px; border-radius:99px;
    background: rgba(255,255,255,.35);
  }
  .dot.on{ background: rgba(92,159,255,1); }

  .talker-messages{
    flex: 1;
    border-radius: var(--radius);
    border: 1px solid var(--stroke);
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(10px);
    box-shadow: var(--shadow);
    display:flex;
    flex-direction: column;
    overflow:hidden;
  }
  .talker-page.is-embed .talker-messages{
    border-radius: 0;
    border-left: 0;
    border-right: 0;
    box-shadow: none;
  }

  .talker-scroll{
    flex: 1;
    overflow: auto;
    padding: 12px;
    scroll-behavior: smooth;
  }
  .bubble-row{
    display:flex;
    margin: 8px 0;
  }
  .bubble-row.me{ justify-content: flex-end; }
  .bubble{
    max-width: 76%;
    padding: 10px 12px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,.10);
    background: var(--them);
    box-shadow: 0 10px 28px rgba(0,0,0,.20);
    line-height: 1.25;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble-row.me .bubble{
    background: var(--me);
    border-color: rgba(92,159,255,.22);
  }
  .meta{
    margin-top: 6px;
    font-size: 11px;
    opacity: .65;
    display:flex;
    gap: 8px;
    align-items:center;
  }
  .meta .u{ font-weight: 800; opacity:.85; }
  .meta .t{ opacity:.70; }

  .composer{
    border-top: 1px solid rgba(255,255,255,.10);
    padding: 10px;
    background: rgba(0,0,0,.12);
  }
  .composer-bar{
    display:flex;
    align-items:flex-end;
    gap: 10px;
  }
  .input{
    flex: 1;
    min-height: 44px;
    max-height: 180px;
    resize: none;
    padding: 10px 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    color: var(--text);
    outline: none;
    font-size: 15px;
    line-height: 1.25;
  }
  .input:focus{
    border-color: rgba(92,159,255,.55);
    box-shadow: 0 0 0 3px rgba(92,159,255,.14);
  }

  .send{
    height: 44px;
    min-width: 44px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid rgba(92,159,255,.40);
    background: linear-gradient(180deg, rgba(92,159,255,.34), rgba(92,159,255,.18));
    color: rgba(255,255,255,.95);
    font-weight: 900;
    cursor: pointer;
    transition: transform .08s ease, filter .2s ease, background .2s ease;
    display:flex;
    align-items:center;
    gap: 8px;
    user-select:none;
    box-shadow: 0 14px 32px rgba(92,159,255,.12);
  }
  .send:active{ transform: scale(.98); }
  .send[disabled]{
    opacity:.45;
    cursor:not-allowed;
    filter: saturate(.7);
    box-shadow: none;
  }

  .composer:focus-within .send:not([disabled]){
    filter: saturate(1.25) brightness(1.05);
    box-shadow: 0 18px 40px rgba(92,159,255,.22);
  }

  .send .txt{ display:inline; }
  .send .ico{ font-size: 18px; line-height: 1; }

  .status{
    font-size: 12px;
    color: var(--muted);
    padding: 6px 2px 0;
    min-height: 18px;
  }

  @media (max-width: 520px){
    .talker-page{ padding: 8px; }
    .talker-shell{ height: calc((var(--vh) * 100) - 70px); }
    .bubble{ max-width: 88%; }
    .talker-page.is-embed .talker-shell{ height: calc(var(--vh) * 100); }

    .send{ padding: 0 12px; }
    .send .txt{ display:none; }
  }
</style>

{% set is_embed = request.args.get('embed') == '1' %}

  <div class="talker-shell">

    <div class="talker-header">
      <div class="talker-title">
        <p class="talker-sub">Najnovšie správy sú dole</p>

      <div class="talker-actions">
        <!--
        <div class="unread-pill" id="unreadPill" title="Neprečítané v tejto miestnosti">
          <span class="unread-dot"></span>
          <span id="unreadCount">0</span>

<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<!-- ✅ Firebase (potrebné pre non-iOS FCM flow, lebo kód používa window.firebase) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-messaging.js"></script>

<script>
  const roomId = {{ room.id }};
  window.__ACTIVE_TALKER_ROOM_ID = roomId;   // ✅ aby menu vedelo odfiltrovať aktívnu room
  const myUserId = {{ current_user.id }};

  const scrollEl = document.getElementById("scroll");
  const listEl = document.getElementById("list");
  const bottomEl = document.getElementById("bottom");
  const formEl = document.getElementById("f");
  const inputEl = document.getElementById("t");
  const sendBtn = document.getElementById("sendBtn");
  const connTextEl = document.getElementById("connText");
  const dotEl = document.getElementById("dot");
  const statusEl = document.getElementById("status");
  const pushBtn = document.getElementById("pushBtn");
  const backBtn = document.getElementById("backBtn");

  // zachované (bolo v súbore)
  const unreadPill = document.getElementById("unreadPill");
  const unreadCountEl = document.getElementById("unreadCount");

  const socket = io({
    transports: ["websocket", "polling"],
    upgrade: true,
    reconnection: true,
    reconnectionAttempts: Infinity,
    reconnectionDelay: 500,
    reconnectionDelayMax: 3000,
  });

  // ---------------------------
  // Badge API (best-effort)
  // ---------------------------
  function setBadge(count) {
    count = Number(count) || 0;
    try {
      if (navigator.setAppBadge) {
        if (count > 0) navigator.setAppBadge(count);
        else if (navigator.clearAppBadge) navigator.clearAppBadge();
      }
    } catch (e) {}
  }

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.addEventListener("message", (event) => {
      const d = event?.data;
      if (!d) return;
  
      // podpor oba typy, kým to celé neprejde na SET_BADGE
      if (d.type === "SET_BADGE" || d.type === "badge") {
        setBadge(d.count || 0);
      }
  
      if (d.type === "open" && d.url) {
        // optional (tvoje)
        window.addEventListener("beforeunload", () => {
          try { window.__ACTIVE_TALKER_ROOM_ID = null; } catch(e) {}
        });
      }
    });
  }
  
  // ---------------------------
  // VH fix (iOS / klávesnica)
  // ---------------------------
  function setVH() {
    const h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
    document.documentElement.style.setProperty("--vh", (h * 0.01) + "px");
  }
  setVH();
  window.addEventListener("resize", setVH);
  window.visualViewport && window.visualViewport.addEventListener("resize", setVH);

  // ---------------------------
  // UI helpers
  // ---------------------------
  function escapeHtml(s) {
    return String(s || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function fmtTime(iso) {
    try {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleString(undefined, { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "2-digit" });
    } catch { return ""; }
  }

  function isNearBottom(px = 60) {
    return (scrollEl.scrollHeight - scrollEl.scrollTop - scrollEl.clientHeight) <= px;
  }

  function scrollToBottomHard() {
    bottomEl && bottomEl.scrollIntoView({ block: "end" });
  }

  function focusNoScroll(){
    try { inputEl.focus({ preventScroll: true }); } catch(e){ inputEl.focus(); }
  }

  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + "px";
  }

  function updateSendState() {
    const ok = !!inputEl.value.trim();
    sendBtn.disabled = !ok;
  }

  inputEl.addEventListener("input", () => {
    autoResize();
    updateSendState();
  });

  // ✅ ENTER = send, SHIFT+ENTER = newline
  inputEl.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    if (e.isComposing) return;

    // Shift+Enter -> nový riadok
    if (e.shiftKey) return;

    // Enter -> odoslať
    e.preventDefault();
    if (!sendBtn.disabled) {
      if (typeof formEl.requestSubmit === "function") formEl.requestSubmit();
      else formEl.dispatchEvent(new Event("submit", { cancelable: true, bubbles: true }));
    }
  });

  function renderMessage(m) {
    const mine = (m.user_id === myUserId);
    const row = document.createElement("div");
    row.className = "bubble-row " + (mine ? "me" : "them");

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = escapeHtml(m.text || "");

    const meta = document.createElement("div");
    meta.className = "meta";
    const u = document.createElement("span");
    u.className = "u";
    u.textContent = m.username || "";
    const t = document.createElement("span");
    t.className = "t";
    t.textContent = fmtTime(m.created_at);

    meta.appendChild(u);
    meta.appendChild(t);

    bubble.appendChild(meta);
    row.appendChild(bubble);

    listEl.appendChild(row);
  }

  // ---------------------------
  // PUSH enable/disable (iOS WebPush / non-iOS FCM)
  // ---------------------------
  const LS_PUSH_ENABLED = "talker:pushEnabled"; // 1 / 0

  function isStandalone() {
    return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  }
  function isIOS() {
    const ua = navigator.userAgent || "";
    return /iPhone|iPad|iPod/i.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  }
  function isSafari() {
    const ua = navigator.userAgent || "";
    return /^((?!chrome|crios|fxios|android).)*safari/i.test(ua);
  }
  function isIosPwaSafari() {
    return isIOS() && isSafari() && isStandalone();
  }

  function canUsePush() {
    if (!("serviceWorker" in navigator)) return false;
    if (!("Notification" in window)) return false;
    if (!("PushManager" in window)) return false;
    if (isIosPwaSafari() && !("PushManager" in window)) return false;
    return true;
  }

  function setPushUiEnabled(enabled) {
    pushBtn.classList.toggle("on", !!enabled);
    pushBtn.textContent = enabled ? "Vypnúť push" : "Zapnúť push";
  }

  function getPushEnabled() {
    return localStorage.getItem(LS_PUSH_ENABLED) === "1";
  }

  function setPushEnabledLocal(enabled) {
    localStorage.setItem(LS_PUSH_ENABLED, enabled ? "1" : "0");
    setPushUiEnabled(enabled);
  }

  // ✅ SERVER-DRIVEN: refresh badge+menu z /talker/update-unread-count/0
  async function refreshUnreadAndBadge() {
    try {
      const r = await fetch("/talker/unread/menu", { credentials: "include" });
  
      const ct = (r.headers.get("content-type") || "").toLowerCase();
      if (!r.ok || !ct.includes("application/json")) return;
  
      const j = await r.json();
  
      const total = Number(j.total_unread_count || 0);
      setBadge(total);
  
      // ak máš globálne menu renderer:
      try {
        if (typeof window.renderUnreadList === "function") {
          window.renderUnreadList(j.unread_counts || []);
        }
      } catch (e) {}
    } catch (e) {}
  }
  

  function urlBase64ToUint8Array(base64String) {
    const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
    const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
    const rawData = atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }

  async function getPushConfig() {
    const res = await fetch("/talker/push/config", { credentials: "include" });
    if (!res.ok) throw new Error("push/config failed");
    const cfg = await res.json();

    try {
      window.__PUSH_CFG__ = cfg;
      if (cfg?.vapidPublicKey) window.vapidPublicKey = cfg.vapidPublicKey;
      if (cfg?.fcmVapidPublicKey) window.fcmVapidPublicKey = cfg.fcmVapidPublicKey;
    } catch (_) {}

    return cfg;
  }

  async function registerRootSW() {
    const reg = await navigator.serviceWorker.register("/firebase-messaging-sw.js", { scope: "/" });
    await navigator.serviceWorker.ready;
    return reg;
  }

  async function enableWebPushIOS() {
    const cfg = await getPushConfig();

    const vapidKeyWebPush = cfg.vapidPublicKey || cfg.fcmVapidPublicKey;
    if (!vapidKeyWebPush) throw new Error("Missing VAPID public key");

    if (!isIosPwaSafari()) {
      throw new Error("iOS vyžaduje Safari + Add to Home Screen (standalone)");
    }

    await registerRootSW();

    const perm = await Notification.requestPermission();
    if (perm !== "granted") throw new Error("Permission not granted");

    const reg = await navigator.serviceWorker.ready;

    const existing = await reg.pushManager.getSubscription();
    const sub = existing || await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(vapidKeyWebPush),
    });

    const r = await fetch("/talker/webpush/subscribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify(sub.toJSON()),
    });
    if (!r.ok) throw new Error("webpush/subscribe failed: " + (await r.text()));
  }

  async function enableFcmNonIOS() {
    const cfg = await getPushConfig();
    await registerRootSW();

    const perm = await Notification.requestPermission();
    if (perm !== "granted") throw new Error("Permission not granted");

    if (!window.firebase) throw new Error("firebase not loaded in page");

    const firebaseCfg = cfg.firebase || {};
    if (!firebaseCfg.messagingSenderId || !firebaseCfg.appId) throw new Error("Missing firebase config");

    const vapidKey = cfg.fcmVapidPublicKey || cfg.vapidPublicKey;
    if (!vapidKey) throw new Error("Missing VAPID key (fcmVapidPublicKey/vapidPublicKey)");

    if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseCfg);

    const reg = await navigator.serviceWorker.ready;

    let messaging;
    try {
      messaging = firebase.messaging();
    } catch (e) {
      throw new Error("firebase.messaging() failed");
    }

    let token;
    try {
      token = await messaging.getToken({
        vapidKey: vapidKey,
        serviceWorkerRegistration: reg,
      });
    } catch (e) {
      console.error("getToken error:", e);
      throw new Error("FCM getToken failed");
    }

    if (!token) throw new Error("no_token");

    // uložiť si posledný FCM token lokálne, aby sa dal unregisternúť aj keď sa neskôr zmení stránka
    try { localStorage.setItem("talker:lastFcmToken", token); } catch(e) {}

    const rr = await fetch("/talker/push/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ token, platform: "web", device: navigator.userAgent }),
    });
    if (!rr.ok) throw new Error("push/register failed: " + (await rr.text()));
  }

  async function enablePushFlow() {
    if (!canUsePush()) {
      throw new Error("Push nie je podporovaný v tomto prehliadači.");
    }

    if (isIOS() && isSafari() && !isStandalone()) {
      throw new Error("Na iOS musíš dať Add to Home Screen (PWA), až potom ide push.");
    }

    if (Notification.permission === "denied") {
      throw new Error("Push sú zablokované v prehliadači. Povoľ ich v nastaveniach webu.");
    }

    if (isIosPwaSafari()) {
      await enableWebPushIOS();
    } else {
      await enableFcmNonIOS();
    }
  }

  async function disablePushFlow() {
    // 1) Odhlás WebPush subscription (iOS flow)
    try {
      const reg = await navigator.serviceWorker.getRegistration("/") || await navigator.serviceWorker.getRegistration();
      if (reg && reg.pushManager) {
        const sub = await reg.pushManager.getSubscription();
        if (sub) {
          // server-side cleanup (ak endpoint existuje)
          try {
            await fetch("/talker/webpush/unsubscribe", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ endpoint: sub.endpoint }),
            });
          } catch (e) {}
          await sub.unsubscribe();
        }
      }
    } catch (e) {}

    // 2) Zmaž FCM token
    try {
      const cfg = window.__PUSH_CFG__ || await getPushConfig();
      const firebaseCfg = cfg.firebase || {};
      const vapidKey = cfg.fcmVapidPublicKey || cfg.vapidPublicKey;

      if (window.firebase && vapidKey && firebaseCfg && firebaseCfg.messagingSenderId && firebaseCfg.appId) {
        if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseCfg);

        const reg = await navigator.serviceWorker.ready;
        const messaging = firebase.messaging();

        // najprv skús deleteToken priamo (zmaže aktuálny token)
        let deletedOk = false;
        try {
          deletedOk = await messaging.deleteToken();
        } catch (e) {}

        // server-side cleanup: pošli token (ak ho máme)
        const lastTok = localStorage.getItem("talker:lastFcmToken");
        if (lastTok) {
          try {
            await fetch("/talker/push/unregister", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ token: lastTok }),
            });
          } catch (e) {}
          try { localStorage.removeItem("talker:lastFcmToken"); } catch(e) {}
        }

        void(deletedOk);
      }
    } catch (e) {}
  }

  async function setPushEnabled(enabled) {
    // UI + local flag
    setPushEnabledLocal(!!enabled);

    if (!enabled) {
      statusEl.textContent = "Vypínam push…";
      await disablePushFlow();
      statusEl.textContent = "Push vypnuté.";
      setTimeout(() => statusEl.textContent = "", 3500);
      return;
    }

    statusEl.textContent = "Zapínam push…";
    await enablePushFlow();
    statusEl.textContent = "Push zapnuté ✅";
    setTimeout(() => statusEl.textContent = "", 4000);
  }

  async function initPushToggle() {
    const saved = localStorage.getItem(LS_PUSH_ENABLED);
    const enabled = (saved === "1");
    setPushUiEnabled(enabled);

    if (!canUsePush()) {
      pushBtn.disabled = true;
      statusEl.textContent = "Push nie je podporovaný v tomto prehliadači.";
      return;
    }


    backBtn.addEventListener("click", () => {
      const params = new URLSearchParams(window.location.search);
      if (params.get("embed") === "1" && window.history.length > 1) {
        window.history.back();
      }
    });


      pushBtn.addEventListener("click", async () => {
      pushBtn.disabled = true;
      try {
        await setPushEnabled(!getPushEnabled());
      } catch (e) {
        console.error(e);
        setPushEnabledLocal(false);
        statusEl.textContent = "Nepodarilo sa: " + (e && e.message ? e.message : "error");
        setTimeout(() => statusEl.textContent = "", 6500);
      } finally {
        pushBtn.disabled = false;
      }
    });
  }

  initPushToggle();

  // ---------------------------
  // initial load messages + server unread bootstrap
  // ---------------------------
  (async () => {
    try {
      // per-room UI pill nechávame disabled/hidden (z tvojho HTML je zakomentované)
      if (unreadCountEl) unreadCountEl.textContent = "0";
      if (unreadPill) unreadPill.classList.remove("on");

      const r = await fetch(`/talker/rooms/${roomId}/messages`, { credentials: "include" });
      const list = await r.json();

      list.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
      listEl.innerHTML = "";

      for (const m of list) {
        renderMessage(m);
      }

      scrollToBottomHard();

      // ✅ server truth: po otvorení room označ ako prečítané a refreshni badge/menu
      try {
        await fetch(`/talker/rooms/${roomId}/mark-read`, {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({}),
        });
      } catch (e) {}

      await refreshUnreadAndBadge();
    } catch (e) {
      console.error(e);
      statusEl.textContent = "Nepodarilo sa načítať správy.";
    }
  })();

  // ---------------------------
  // socket
  // ---------------------------
  socket.on("connect", async () => {
    connTextEl.textContent = "Online";
    dotEl.classList.add("on");

    socket.emit("talker_join", { room_id: roomId });
    scrollToBottomHard();

    // ✅ server truth: mark read + refresh
    try {
      await fetch(`/talker/rooms/${roomId}/mark-read`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({}),
      });
    } catch (e) {}

    await refreshUnreadAndBadge();
  });

  socket.on("unread_update", (payload) => {
    try {
      const total = Number(payload?.total_unread_count || 0);
      setBadge(total);
  
      // ak máš globálne menu renderer:
      if (typeof window.renderUnreadList === "function") {
        window.renderUnreadList(payload.unread_counts || []);
      }
    } catch (e) {}
  });


  socket.on("talker_joined", (d) => {
    console.log("joined:", d.room_id);
    scrollToBottomHard();
  });

  socket.on("disconnect", () => {
    connTextEl.textContent = "Offline";
    dotEl.classList.remove("on");
  });

  socket.on("talker_error", (e) => {
    statusEl.textContent = "Chyba: " + ((e && e.error) ? e.error : "unknown");
    setTimeout(() => statusEl.textContent = "", 3500);
  });

  socket.on("talker_message", async (m) => {
    const atBottom = isNearBottom(80);
    const visible = !document.hidden;

    renderMessage(m);

    // ✅ server-driven: keď som pri dne + tabu vidím, označ prečítané
    if (atBottom && visible) {
      scrollToBottomHard();

      try {
        await fetch(`/talker/rooms/${roomId}/mark-read`, {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({}),
        });
      } catch (e) {}

      await refreshUnreadAndBadge();
    }
    // ❌ už nerátame lokálne unread (žiadne incUnread)
  });

  formEl.addEventListener("submit", async (e) => {
    e.preventDefault();

    const text = inputEl.value.trim();
    if (!text) return;

    socket.emit("talker_send", { room_id: roomId, text });

    inputEl.value = "";
    autoResize();
    updateSendState();
    focusNoScroll();

    scrollToBottomHard();

    // po odoslaní (som v roome) označ read + refresh global badge/menu
    try {
      await fetch(`/talker/rooms/${roomId}/mark-read`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({}),
      });
    } catch (e) {}

    await refreshUnreadAndBadge();
  });

  autoResize();
  updateSendState();

  // best-effort clear badge
  try {
    if ("clearAppBadge" in navigator) navigator.clearAppBadge();
    else if ("setAppBadge" in navigator) navigator.setAppBadge(0);
  } catch (e) {}

/*
  document.addEventListener("DOMContentLoaded", () => {
    refreshUnreadAndBadge();
  });
  
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") refreshUnreadAndBadge();
  });
  */
</script>

{% endblock %}
