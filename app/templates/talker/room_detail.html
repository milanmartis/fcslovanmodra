{% extends base_template %}
{% block content %}

<style scoped>
  :root{
    --bg: #070b14;
    --bg2:#0b1220;
    --panel: rgba(255,255,255,.06);
    --panel2: rgba(255,255,255,.09);
    --stroke: rgba(255,255,255,.10);
    --text: rgba(255,255,255,.92);
    --muted: rgba(255,255,255,.60);

    --accent: rgba(92,159,255,1);
    --accent2: rgba(125, 92, 255, 1);

    --me: rgba(92, 159, 255, .22);
    --them: rgba(255,255,255,.10);

    --radius: 18px;
    --shadow: 0 18px 50px rgba(0,0,0,.45);

    /* JS nastavuje pri klávesnici */
    --kb: 0px;
    --vh: 1vh;
  }

  .talker-page{
    min-height: calc(var(--vh) * 100);
    background:
      radial-gradient(1100px 560px at 18% 0%, rgba(92,159,255,.20), transparent 60%),
      radial-gradient(900px 520px at 92% 18%, rgba(125,92,255,.12), transparent 60%),
      linear-gradient(180deg, var(--bg), var(--bg2));
    color: var(--text);
    padding: 12px;
  }

  .talker-page.is-embed{
    padding: 0;
  }

  .talker-shell{
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: calc((var(--vh) * 100) - 88px);
    gap: 10px;
  }

  .talker-page.is-embed .talker-shell{
    max-width: 100%;
    height: calc(var(--vh) * 100);
    gap: 0;
  }

  .talker-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 10px 12px;
    border-radius: var(--radius);
    background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
    border: 1px solid var(--stroke);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
  }

  .talker-page.is-embed .talker-header{
    border-radius: 0;
    box-shadow: none;
    border-left: 0;
    border-right: 0;
  }

  .talker-title{
    display:flex;
    flex-direction:column;
    gap:2px;
    min-width:0;
  }
  .talker-title h2{
    margin:0;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: .2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .talker-sub{
    margin:0;
    font-size: 12px;
    color: var(--muted);
  }

  .talker-badge{
    display:flex;
    align-items:center;
    gap: 8px;
    font-size: 12px;
    color: rgba(255,255,255,.86);
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.10);
  }
  .dot{
    width: 8px; height: 8px;
    border-radius: 999px;
    background: rgba(255,255,255,.45);
    box-shadow: 0 0 0 3px rgba(255,255,255,.06);
  }
  .dot.on{
    background: rgba(92,159,255,1);
    box-shadow: 0 0 0 4px rgba(92,159,255,.18);
  }

  .talker-messages{
    flex:1;
    display:flex;
    flex-direction: column;
    min-height: 0;

    border-radius: var(--radius);
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.04));
    border: 1px solid var(--stroke);
    backdrop-filter: blur(12px);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .talker-page.is-embed .talker-messages{
    border-radius: 0;
    border-left: 0;
    border-right: 0;
    box-shadow: none;
  }

  .talker-scroll{
    flex:1;
    min-height:0;
    overflow-y:auto;
    padding: 14px 12px;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: auto;
  }

  .talker-scroll::-webkit-scrollbar{ width: 10px; }
  .talker-scroll::-webkit-scrollbar-thumb{
    background: rgba(255,255,255,.12);
    border-radius: 999px;
    border: 3px solid rgba(0,0,0,0);
    background-clip: padding-box;
  }

  .msg-row{
    display:flex;
    margin: 8px 0;
  }
  .msg-row.me{ justify-content:flex-end; }
  .msg-row.them{ justify-content:flex-start; }

  .bubble{
    max-width: min(82%, 560px);
    padding: 10px 12px;
    border-radius: 16px;
    line-height: 1.25;
    background: rgba(255,255,255,.10);
    border: 1px solid rgba(255,255,255,.08);
    box-shadow: 0 10px 26px rgba(0,0,0,.22);
    animation: pop .14s ease-out;
  }
  .msg-row.me .bubble{
    background: linear-gradient(180deg, rgba(92,159,255,.30), rgba(92,159,255,.18));
    border-color: rgba(92,159,255,.30);
  }

  @keyframes pop{
    from{ transform: translateY(2px) scale(.99); opacity: .7; }
    to{ transform: translateY(0) scale(1); opacity: 1; }
  }

  .meta{
    display:flex;
    gap: 8px;
    align-items: baseline;
    margin-bottom: 4px;
  }
  .name{
    font-size: 12px;
    font-weight: 800;
    color: rgba(255,255,255,.86);
  }
  .time{
    font-size: 11px;
    color: var(--muted);
  }
  .text{
    font-size: 14px;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Composer je sticky, takže na mobile zostane hore nad klávesnicou (pomáha aj --kb) */
  .composer{
    position: sticky;
    bottom: 0;
    z-index: 5;

    padding: 10px 10px calc(10px + env(safe-area-inset-bottom) + var(--kb));
    background: linear-gradient(to top,
      rgba(7,11,20,.92),
      rgba(7,11,20,.35),
      rgba(7,11,20,0)
    );
    pointer-events: none;
  }

  .composer-bar{
    pointer-events: auto;
    display:flex;
    gap: 10px;
    align-items:flex-end;

    padding: 10px;
    border-radius: 16px;
    background: rgba(0,0,0,.30);
    border: 1px solid rgba(255,255,255,.10);
    backdrop-filter: blur(14px);
    box-shadow: 0 12px 34px rgba(0,0,0,.35);
  }

  .input{
    flex:1;
    min-height: 44px;
    max-height: 160px;
    resize: none;

    padding: 11px 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    color: var(--text);
    outline: none;
    font-size: 15px;
    line-height: 1.25;
  }
  .input:focus{
    border-color: rgba(92,159,255,.55);
    box-shadow: 0 0 0 3px rgba(92,159,255,.14);
  }

  /* Send tlačidlo viac “app-like” */
  .send{
    height: 44px;
    min-width: 44px;
    padding: 0 14px;
    border-radius: 999px;

    border: 1px solid rgba(92,159,255,.40);
    background: linear-gradient(180deg, rgba(92,159,255,.34), rgba(92,159,255,.18));
    color: rgba(255,255,255,.95);
    font-weight: 900;
    cursor: pointer;
    transition: transform .08s ease, filter .2s ease, background .2s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 8px;
    user-select:none;
    box-shadow: 0 14px 32px rgba(92,159,255,.12);
  }
  .send:active{ transform: scale(.98); }
  .send[disabled]{
    opacity:.45;
    cursor:not-allowed;
    filter: saturate(.7);
    box-shadow: none;
  }

  /* keď je input focusnutý, zvýrazni send (viditeľnejšie pri klávesnici) */
  .composer:focus-within .send:not([disabled]){
    filter: saturate(1.25) brightness(1.05);
    box-shadow: 0 18px 40px rgba(92,159,255,.22);
  }

  .send .txt{ display:inline; }
  .send .ico{ font-size: 18px; line-height: 1; }

  .status{
    font-size: 12px;
    color: var(--muted);
    padding: 6px 2px 0;
  }

  @media (max-width: 520px){
    .talker-page{ padding: 8px; }
    .talker-shell{ height: calc((var(--vh) * 100) - 70px); }
    .bubble{ max-width: 88%; }
    .talker-page.is-embed .talker-shell{ height: calc(var(--vh) * 100); }

    /* na mobile skry text "Send", nech je to ikonové a kompaktnejšie */
    .send{ padding: 0 12px; }
    .send .txt{ display:none; }
  }
</style>

{% set is_embed = request.args.get('embed') == '1' %}

<div class="talker-page {{ 'is-embed' if is_embed else '' }}">
  <div class="talker-shell">

    <div class="talker-header">
      <div class="talker-title">
        <h2>{{ room.name }}</h2>
        <p class="talker-sub">Najnovšie správy sú dole</p>
      </div>
      <div class="talker-badge" id="conn">
        <span id="dot" class="dot"></span>
        <span id="connText">Connecting…</span>
      </div>
    </div>

    <div class="talker-messages">
      <div id="scroll" class="talker-scroll">
        <div id="list"></div>
        <div id="bottom"></div>
      </div>

      <div class="composer">
        <form id="f" class="composer-bar" autocomplete="off">
          <textarea id="t" class="input" rows="1" placeholder="Napíš správu… (Enter = odoslať, Shift+Enter = nový riadok)"></textarea>
          <button id="sendBtn" class="send" type="submit" disabled>
            <span class="txt">Send</span>
            <span class="ico" aria-hidden="true">➤</span>
          </button>
        </form>
        <div class="status" id="status"></div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
  const roomId = {{ room.id }};
  const myUserId = {{ current_user.id }};

  const scrollEl = document.getElementById("scroll");
  const listEl = document.getElementById("list");
  const bottomEl = document.getElementById("bottom");
  const formEl = document.getElementById("f");
  const inputEl = document.getElementById("t");
  const sendBtn = document.getElementById("sendBtn");
  const connTextEl = document.getElementById("connText");
  const dotEl = document.getElementById("dot");
  const statusEl = document.getElementById("status");

  const socket = io({
    transports: ["websocket", "polling"],
    upgrade: true,
    reconnection: true,
    reconnectionAttempts: Infinity,
    reconnectionDelay: 500,
    reconnectionDelayMax: 3000,
  });

  // ---- VH + klávesnica (iOS/Android) ----
  function setVH() {
    const h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
    document.documentElement.style.setProperty("--vh", (h * 0.01) + "px");
  }

  // odhad klávesnice: pri visualViewport sa dá krásne zdvihnúť composer cez padding (sticky)
  function setKeyboardVar() {
    if (!window.visualViewport) {
      document.documentElement.style.setProperty("--kb", "0px");
      return;
    }
    // keyboardHeight ~ rozdiel medzi window.innerHeight a visualViewport.height (+ offsetTop na iOS)
    const vv = window.visualViewport;
    const keyboard = Math.max(0, (window.innerHeight - vv.height - vv.offsetTop));
    document.documentElement.style.setProperty("--kb", keyboard + "px");
  }

  function onViewportChange() {
    setVH();
    setKeyboardVar();
    // keď sa otvorí klávesnica, drž spodok len ak user bol dole (jemne, bez skákania)
    const wasAtBottom = isNearBottom(120);
    const prevScrollHeight = scrollEl.scrollHeight;
    keepBottomIfWasAtBottom(wasAtBottom, prevScrollHeight);
  }

  setVH();
  setKeyboardVar();
  window.addEventListener("resize", onViewportChange);
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", onViewportChange);
    window.visualViewport.addEventListener("scroll", onViewportChange);
  }

  // ---- SCROLL LOGIKA (bez poskakovania vo Firefoxe) ----
  function isNearBottom(px = 60) {
    const delta = scrollEl.scrollHeight - scrollEl.scrollTop - scrollEl.clientHeight;
    return delta <= px;
  }

  function scrollToBottomHard() {
    requestAnimationFrame(() => {
      scrollEl.scrollTop = scrollEl.scrollHeight;
    });
  }

  function keepBottomIfWasAtBottom(wasAtBottom, prevScrollHeight) {
    if (!wasAtBottom) return;
    requestAnimationFrame(() => {
      const newScrollHeight = scrollEl.scrollHeight;
      const delta = newScrollHeight - prevScrollHeight;
      if (delta !== 0) scrollEl.scrollTop += delta;
    });
  }

  function fmtTime(iso) {
    if (!iso) return "";
    try {
      const d = new Date(iso);
      return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    } catch { return ""; }
  }

  function renderMessage(m) {
    const row = document.createElement("div");
    const mine = (m.user_id === myUserId);
    row.className = "msg-row " + (mine ? "me" : "them");

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const meta = document.createElement("div");
    meta.className = "meta";

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = (m.username ?? "user").toString();

    const time = document.createElement("div");
    time.className = "time";
    time.textContent = fmtTime(m.created_at);

    meta.appendChild(name);
    meta.appendChild(time);

    const text = document.createElement("div");
    text.className = "text";
    text.textContent = (m.text ?? "").toString();

    bubble.appendChild(meta);
    bubble.appendChild(text);
    row.appendChild(bubble);

    listEl.appendChild(row);
  }

  function autoResize() {
    const prev = inputEl.offsetHeight;
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
    const next = inputEl.offsetHeight;
    return next - prev;
  }

  function updateSendState() {
    sendBtn.disabled = inputEl.value.trim().length === 0;
  }

  // pri písaní NESKÁČ na spodok (Firefox), len jemne dorovnaj ak user bol dole a textarea sa zmenila
  inputEl.addEventListener("input", () => {
    const wasAtBottom = isNearBottom(80);
    const prevScrollHeight = scrollEl.scrollHeight;

    autoResize();
    updateSendState();

    keepBottomIfWasAtBottom(wasAtBottom, prevScrollHeight);
  });

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) formEl.requestSubmit();
    }
  });

  function focusNoScroll() {
    try { inputEl.focus({ preventScroll: true }); }
    catch { inputEl.focus(); }
  }

  // initial load
  fetch(`/talker/rooms/${roomId}/messages`)
    .then(r => r.json())
    .then(list => {
      list.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
      listEl.innerHTML = "";
      list.forEach(renderMessage);
      scrollToBottomHard();
    })
    .catch(() => {
      statusEl.textContent = "Nepodarilo sa načítať správy.";
    });

  socket.on("connect", () => {
    connTextEl.textContent = "Online";
    dotEl.classList.add("on");
    socket.emit("talker_join", { room_id: roomId });
    scrollToBottomHard();
  });

  socket.on("talker_joined", (d) => {
    console.log("joined:", d.room_id);
    scrollToBottomHard();
  });

  socket.on("disconnect", () => {
    connTextEl.textContent = "Offline";
    dotEl.classList.remove("on");
  });

  socket.on("talker_error", (e) => {
    statusEl.textContent = "Chyba: " + (e?.error || "unknown");
    setTimeout(() => statusEl.textContent = "", 3500);
  });

  socket.on("talker_message", (m) => {
    renderMessage(m);
    scrollToBottomHard();
  });

  formEl.addEventListener("submit", (e) => {
    e.preventDefault();

    const text = inputEl.value.trim();
    if (!text) return;

    socket.emit("talker_send", { room_id: roomId, text });

    inputEl.value = "";
    autoResize();
    updateSendState();
    focusNoScroll();

    scrollToBottomHard();
  });

  autoResize();
  updateSendState();
</script>

{% endblock %}
