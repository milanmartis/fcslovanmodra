{% extends "layout.html" %}
{% block content %}

<style>
  :root{
    --bg: #0b1220;
    --panel: rgba(255,255,255,.06);
    --text: rgba(255,255,255,.92);
    --muted: rgba(255,255,255,.60);
    --me: rgba(92, 159, 255, .20);
    --them: rgba(255,255,255,.10);
  }

  .talker-page{
    min-height: calc(100vh - 64px);
    background: radial-gradient(1200px 600px at 20% 0%, rgba(92,159,255,.18), transparent 60%),
                radial-gradient(900px 500px at 90% 20%, rgba(255,255,255,.08), transparent 55%),
                var(--bg);
    color: var(--text);
    padding: 12px;
  }

  .talker-shell{
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 88px);
    gap: 10px;
  }

  .talker-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 10px 12px;
    border-radius: 16px;
    background: var(--panel);
    backdrop-filter: blur(10px);
  }
  .talker-title{
    display:flex;
    flex-direction:column;
    gap:2px;
    min-width:0;
  }
  .talker-title h2{
    margin:0;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .talker-sub{
    margin:0;
    font-size: 12px;
    color: var(--muted);
  }
  .talker-badge{
    font-size: 12px;
    color: var(--muted);
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,.06);
  }

  .talker-messages{
    flex:1;
    position: relative;
    border-radius: 18px;
    background: var(--panel);
    backdrop-filter: blur(10px);
    overflow: hidden;
  }

  .talker-scroll{
    height: 100%;
    overflow-y: auto;
    padding: 12px 12px 90px; /* miesto pre composer */
    scroll-behavior: smooth;
    overscroll-behavior: contain; /* nech to “neťahá” parent stránku */
  }

  .talker-scroll::-webkit-scrollbar{ width: 10px; }
  .talker-scroll::-webkit-scrollbar-thumb{
    background: rgba(255,255,255,.12);
    border-radius: 999px;
    border: 3px solid rgba(0,0,0,0);
    background-clip: padding-box;
  }

  .msg-row{
    display:flex;
    margin: 6px 0;
  }
  .msg-row.me{ justify-content:flex-end; }
  .msg-row.them{ justify-content:flex-start; }

  .bubble{
    max-width: min(78%, 520px);
    padding: 10px 12px;
    border-radius: 16px;
    line-height: 1.25;
    background: var(--them);
    box-shadow: 0 6px 18px rgba(0,0,0,.18);
    border: 1px solid rgba(255,255,255,.07);
    animation: pop .14s ease-out;
  }
  .msg-row.me .bubble{
    background: var(--me);
    border-color: rgba(92,159,255,.25);
  }

  @keyframes pop{
    from{ transform: scale(.98); opacity: .6; }
    to{ transform: scale(1); opacity: 1; }
  }

  .meta{
    display:flex;
    gap: 8px;
    align-items: baseline;
    margin-bottom: 4px;
  }
  .name{
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,.84);
  }
  .time{
    font-size: 11px;
    color: var(--muted);
  }
  .text{
    font-size: 14px;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .composer{
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 10px;
    background: linear-gradient(to top, rgba(11,18,32,.88), rgba(11,18,32,.0));
    pointer-events: none;
  }

  .composer-bar{
    pointer-events: auto;
    display:flex;
    gap: 10px;
    align-items:flex-end;
    padding: 10px;
    border-radius: 16px;
    background: rgba(0,0,0,.25);
    border: 1px solid rgba(255,255,255,.08);
    backdrop-filter: blur(10px);
  }

  .input{
    flex:1;
    min-height: 42px;
    max-height: 140px;
    resize: none;
    padding: 10px 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.06);
    color: var(--text);
    outline: none;
    font-size: 14px;
    line-height: 1.25;
  }
  .input:focus{
    border-color: rgba(92,159,255,.45);
    box-shadow: 0 0 0 3px rgba(92,159,255,.12);
  }

  .send{
    height: 42px;
    padding: 0 14px;
    border-radius: 14px;
    border: 1px solid rgba(92,159,255,.35);
    background: rgba(92,159,255,.18);
    color: rgba(255,255,255,.92);
    font-weight: 700;
    cursor: pointer;
    transition: transform .08s ease, background .2s ease;
    display:flex;
    align-items:center;
    gap: 8px;
    user-select:none;
  }
  .send:active{ transform: scale(.98); }
  .send[disabled]{ opacity:.55; cursor:not-allowed; }

  .status{
    font-size: 12px;
    color: var(--muted);
    padding: 0 2px;
  }

  @media (max-width: 520px){
    .talker-shell{ height: calc(100vh - 70px); }
    .bubble{ max-width: 86%; }
  }
</style>

<div class="talker-page">
  <div class="talker-shell">

    <div class="talker-header">
      <div class="talker-title">
        <h2>{{ room.name }}</h2>
        <p class="talker-sub">Najnovšie správy sú dole</p>
      </div>
      <div class="talker-badge" id="conn">Connecting…</div>
    </div>

    <div class="talker-messages">
      <div id="scroll" class="talker-scroll">
        <div id="list"></div>
        <!-- kotva úplne dole -->
        <div id="bottom"></div>
      </div>

      <div class="composer">
        <form id="f" class="composer-bar" autocomplete="off">
          <textarea id="t" class="input" rows="1" placeholder="Napíš správu… (Enter = odoslať, Shift+Enter = nový riadok)"></textarea>
          <button id="sendBtn" class="send" type="submit" disabled>
            <span>Send</span>
            <span aria-hidden="true">➤</span>
          </button>
        </form>
        <div class="status" id="status"></div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
  const roomId = {{ room.id }};
  const myUserId = {{ current_user.id }};

  const scrollEl = document.getElementById("scroll");
  const listEl = document.getElementById("list");
  const bottomEl = document.getElementById("bottom");
  const formEl = document.getElementById("f");
  const inputEl = document.getElementById("t");
  const sendBtn = document.getElementById("sendBtn");
  const connEl = document.getElementById("conn");
  const statusEl = document.getElementById("status");

  const socket = io({ transports: ["websocket", "polling"] });

  function isNearBottom() {
    const delta = scrollEl.scrollHeight - scrollEl.scrollTop - scrollEl.clientHeight;
    return delta < 140;
  }

  function scrollToBottom(force=false) {
    if (!force && !isNearBottom()) return;
    // nikdy nescrolluj window, iba vnútorný kontajner
    requestAnimationFrame(() => {
      scrollEl.scrollTop = scrollEl.scrollHeight;
    });
  }

  function fmtTime(iso) {
    if (!iso) return "";
    try {
      const d = new Date(iso);
      return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    } catch { return ""; }
  }

  function renderMessage(m) {
    const row = document.createElement("div");
    const mine = (m.user_id === myUserId);
    row.className = "msg-row " + (mine ? "me" : "them");

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const meta = document.createElement("div");
    meta.className = "meta";

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = (m.username ?? "user").toString();

    const time = document.createElement("div");
    time.className = "time";
    time.textContent = fmtTime(m.created_at);

    meta.appendChild(name);
    meta.appendChild(time);

    const text = document.createElement("div");
    text.className = "text";
    text.textContent = (m.text ?? "").toString();

    bubble.appendChild(meta);
    bubble.appendChild(text);
    row.appendChild(bubble);

    listEl.appendChild(row); // najnovšia pôjde dole
  }

  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  }

  function updateSendState() {
    sendBtn.disabled = inputEl.value.trim().length === 0;
  }

  inputEl.addEventListener("input", () => {
    autoResize();
    updateSendState();
  });

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) formEl.requestSubmit();
    }
  });

  function focusNoScroll() {
    try {
      inputEl.focus({ preventScroll: true });
    } catch {
      inputEl.focus();
    }
  }

  // initial load
  fetch(`/talker/rooms/${roomId}/messages`)
    .then(r => r.json())
    .then(list => {
      // dôležité: chronologicky, aby najnovšia bola dole
      list.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
      listEl.innerHTML = "";
      list.forEach(renderMessage);
      scrollToBottom(true);
    })
    .catch(() => {
      statusEl.textContent = "Nepodarilo sa načítať správy.";
    });

  socket.on("connect", () => {
    connEl.textContent = "Online";
    connEl.style.color = "rgba(255,255,255,.9)";
    socket.emit("talker_join", { room_id: roomId });
  });

  socket.on("disconnect", () => {
    connEl.textContent = "Offline";
  });

  socket.on("talker_error", (e) => {
    statusEl.textContent = "Chyba: " + (e?.error || "unknown");
    setTimeout(() => statusEl.textContent = "", 3500);
  });

  socket.on("talker_message", (m) => {
    const stick = isNearBottom();
    renderMessage(m);
    scrollToBottom(stick); // ak si pri spodku, drží ťa to dole
  });

  formEl.addEventListener("submit", (e) => {
    e.preventDefault();

    const text = inputEl.value.trim();
    if (!text) return;

    // po odoslaní chceme byť vždy dole
    scrollToBottom(true);

    socket.emit("talker_send", { room_id: roomId, text });

    inputEl.value = "";
    autoResize();
    updateSendState();
    focusNoScroll();        // toto je kľúč proti “skoku” stránky/iframe
    scrollToBottom(true);   // a ešte raz po resiznutí textarea
  });

  autoResize();
  updateSendState();
</script>

{% endblock %}
