{% extends "layout.html" %}
{% block content %}

<style>
  /* fullscreen modal overlay */
  .tmodal{
    position: fixed;
    inset: 0;
    z-index: 99999999999999999999999999999999999999999999999999999999999999999;
    background: rgba(0,0,0,.55);
    display: none;
    padding: 16px;
  }
  .tmodal.open { display: block; }

  /* center wrapper (desktop window) */
  .tmodal__panel{
    position: relative;
    width: 100%;
    height: 100%;
    margin: 0 auto;
    background: #0b1220;
    overflow: hidden;
    display: flex;
    flex-direction: column;

    /* default = “window” */
    max-width: 1100px;
    max-height: 86vh;
    border-radius: 18px;
    box-shadow: 0 24px 80px rgba(0,0,0,.55);
    border: 1px solid rgba(255,255,255,.10);
  }

  /* top bar */
  .tmodal__top{
    flex: 0 0 56px;
    height: 56px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 0 12px;
    background: rgba(255,255,255,.06);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,.08);
    color: rgba(255,255,255,.92);
  }
  .tmodal__title{
    font-weight: 700;
    font-size: 14px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    max-width: 70%;
  }
  .tmodal__close{
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    color: rgba(255,255,255,.92);
    font-size: 18px;
    cursor: pointer;
  }

  /* iframe area – height is computed via CSS var set from VisualViewport */
  .tmodal__frameWrap{
    flex: 1 1 auto;
    min-height: 0;     /* dôležité pre flex */
    height: auto;
  }
  
  .tmodal__frame{
    width: 100%;
    height: 100%;      /* desktop: berie výšku rodiča, nie viewport */
    border: 0;
    background: transparent;
    display:block;
  }

  /* MOBILE: fullscreen panel + safe-area + real fullscreen height */
  @media (max-width: 820px) {
    .tmodal{
      padding: 0;
    }
    .tmodal__panel{
      max-width: none;
      max-height: none;
      width: 100%;
      height: calc(var(--vvh, 1vh) * 100);
      border-radius: 0;
      border: 0;
      box-shadow: none;
    }
    .tmodal__top{
      padding-top: env(safe-area-inset-top);
      height: calc(56px + env(safe-area-inset-top));
    }
    .tmodal__frame{
      height: calc(var(--vvh, 1vh) * 100 - (56px + env(safe-area-inset-top)));
    }
  }

  /* nice room list */
  .rooms{
    max-width: 760px;
    margin: 0 auto;
    padding: 12px;
  }

  .btn9{
    text-align: center;
    border-radius: 10px !important;
    background-color:rgba(0,0,0,.55);
    border: 2px solid #6d9bff;
    color: #6d9bff;
    font-weight: 600;
    font-size: 100%;
    padding: 2px 12px 4px 12px;
    margin-top: 17px;
    margin-left: 6px;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  }
  .btn9:active{
    background-color: #6d9bff;
    border: 2px solid #6d9bff;
    color: #030303;
  }
  .btn9:hover,
  .btn9:focus{
    background-color: #6d9bff;
    border: 2px solid #6d9bff;
    color: #030303;
    box-shadow: 0 0 12px rgba(109, 155, 255, 0.7);
  }

  .roomLink{
    display: block;
    padding: 12px 14px;
    border-radius: 14px;
    text-decoration: none;
    margin-bottom: 10px;
  }
</style>

<div class="rooms">
  <center><h1>Talker rooms</h1></center>

  {% for r in rooms %}
    <a class="btn9 roomLink"
       href="{{ url_for('talker.room_detail', room_id=r.id) }}"
       data-room-id="{{ r.id }}"
       data-room-name="{{ r.name|e }}">
      {{ r.name }}
    </a>
  {% endfor %}
</div>

<!-- Modal overlay -->
<div id="tmodal" class="tmodal" aria-hidden="true">
  <div class="tmodal__panel" role="dialog" aria-modal="true" aria-label="Talker room">
    <div class="tmodal__top">
      <div id="tmodalTitle" class="tmodal__title">Room</div>
      <button id="tmodalClose" class="tmodal__close" type="button" aria-label="Close">✕</button>
    </div>

    <div class="tmodal__frameWrap">
      <iframe id="tmodalFrame" class="tmodal__frame" src="about:blank"></iframe>
    </div>
  </div>
</div>

<script>
  const modal = document.getElementById("tmodal");
  const frame = document.getElementById("tmodalFrame");
  const title = document.getElementById("tmodalTitle");
  const closeBtn = document.getElementById("tmodalClose");

  // --- VisualViewport fix (keyboard on mobile) ---
  function setVvh() {
    const h = (window.visualViewport && window.visualViewport.height)
      ? window.visualViewport.height
      : window.innerHeight;
    document.documentElement.style.setProperty("--vvh", (h / 100) + "px");
  }
  setVvh();
  window.addEventListener("resize", setVvh, { passive: true });
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", setVvh, { passive: true });
    window.visualViewport.addEventListener("scroll", setVvh, { passive: true });
  }

  // --- hard lock background scroll (no scrollbar bleed) ---
  let __scrollY = 0;

  function lockScroll() {
    __scrollY = window.scrollY || document.documentElement.scrollTop || 0;

    document.documentElement.style.overflow = "hidden"; // istota
    document.body.style.overflow = "hidden";

    // kľúčové: fixne body na aktuálnej pozícii
    document.body.style.position = "fixed";
    document.body.style.top = `-${__scrollY}px`;
    document.body.style.left = "0";
    document.body.style.right = "0";
    document.body.style.width = "100%";

    // optional: blokuj “rubber band”/touch scroll
    document.body.style.touchAction = "none";
  }

  function unlockScroll() {
    document.documentElement.style.overflow = "";
    document.body.style.overflow = "";
    document.body.style.position = "";
    document.body.style.top = "";
    document.body.style.left = "";
    document.body.style.right = "";
    document.body.style.width = "";
    document.body.style.touchAction = "";

    // vráť sa na pôvodný scroll
    window.scrollTo(0, __scrollY);
  }

  function openRoom(roomId, roomName) {
    title.textContent = roomName || "Room";
    modal.classList.add("open");
    modal.setAttribute("aria-hidden", "false");
    lockScroll();
    setVvh();

    frame.src = `/talker/rooms/${roomId}?embed=1`;
  }

  function closeRoom() {
    modal.classList.remove("open");
    modal.setAttribute("aria-hidden", "true");
    unlockScroll();
    frame.src = "about:blank";
  }

  closeBtn.addEventListener("click", closeRoom);

  modal.addEventListener("click", (e) => {
    if (e.target === modal) closeRoom();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && modal.classList.contains("open")) closeRoom();
  });

  document.querySelectorAll("a.roomLink").forEach(a => {
    a.addEventListener("click", (e) => {
      e.preventDefault();
      openRoom(a.dataset.roomId, a.dataset.roomName);
    });
  });

  frame.addEventListener("load", () => setTimeout(setVvh, 50));
</script>


{% endblock %}
